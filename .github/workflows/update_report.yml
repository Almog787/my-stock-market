name: Dynamic Portfolio Update
on:
  push:
    paths:
      - 'data_hub/*.json' # ירוץ רק כשנתוני המניות משתנים
  workflow_dispatch: # מאפשר הרצה ידנית

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install pandas numpy matplotlib
        
      - name: Run Analysis
        run: python analyzer.py
        
      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ANALYSIS_REPORT.md data_hub/portfolio_analysis.png
          git diff-index --quiet HEAD || git commit -m "docs: auto-update portfolio analysis [skip ci]"
          git pull --rebase origin main
          git push origin main
